<!-- ================================================================
  AI MCQs Engine — Universal Embed Snippet
  ----------------------------------------------------------------
  ① Paste the HEAD BLOCK once per site (in <head> or before </body>)
  ② Then drop a QUIZ BLOCK anywhere you want a quiz to appear.
  Replace YOUR-USER, YOUR-REPO, and VERSION with your GitHub details.
================================================================ -->


<!-- ════════════════════════════════════════════════════════════
  ① HEAD BLOCK — paste ONCE per site
════════════════════════════════════════════════════════════ -->
<link  rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.css">
<link  rel="stylesheet" href="https://cdn.jsdelivr.net/gh/YOUR-USER/aimcq-engine@VERSION/aimcq.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/contrib/auto-render.min.js"></script>
<script defer src="https://unpkg.com/smiles-drawer@2.0.1/dist/smiles-drawer.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/gh/YOUR-USER/aimcq-engine@VERSION/aimcq.js"></script>


<!-- ════════════════════════════════════════════════════════════
  ② QUIZ BLOCKS — paste per page/post where you want a quiz
════════════════════════════════════════════════════════════ -->


<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  METHOD 1 — Inline JSON
  Best for: small quizzes you want fully self-contained in the page.
  How: paste your exported quiz JSON directly into quizData below.
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<div id="aimcq-quiz-1"></div>
<script>
document.addEventListener('DOMContentLoaded', function () {

  var quizData = { /* paste your exported quiz JSON here */ };

  window.initAimcqQuiz('aimcq-quiz-1', quizData, {
    title: "My Quiz Title",
    description: "Short description shown on the start screen",
    timer: 10,                  // minutes; 0 = no timer
    shuffle_questions: true,
    shuffle_options: true,
    quiz_questions: 10,
    reload_after: 0
  });
});
</script>


<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  METHOD 2 — Single JSON file from a public URL
  Best for: one chapter / one topic loaded from GitHub + jsDelivr.

  How to get a jsDelivr URL for your JSON file:
    1. Push your JSON file to a public GitHub repo
    2. Create a release tag (e.g. v1.0)
    3. URL pattern:
       https://cdn.jsdelivr.net/gh/USER/REPO@TAG/path/to/file.json

  Works with ANY public URL — jsDelivr, raw.githubusercontent.com,
  your own server, Cloudflare R2, S3, etc.
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<div id="aimcq-quiz-2"></div>
<script>
document.addEventListener('DOMContentLoaded', function () {

  window.loadAimcqFromDrive('aimcq-quiz-2', {

    jsonUrl: 'https://cdn.jsdelivr.net/gh/fvl777/fvl777@main/neetphyjson/CH-1_%20Basic%20Mathematics%20in%20Physics.json',
    // ↑ Replace with your own jsDelivr / CDN URL

    settings: {
      title: "NEET Physics — Ch 1: Basic Mathematics in Physics",
      description: "Chapter 1 MCQs loaded from GitHub CDN",
      timer: 10,
      shuffle_questions: true,
      shuffle_options: true,
      quiz_questions: 10,
      reload_after: 0
    }
  });
});
</script>


<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  METHOD 3 — Multiple JSON files from public URLs (merged quiz)
  Best for: multi-chapter / multi-subject tests where each chapter
            is a separate JSON file on GitHub / CDN.

  Each entry in jsonUrls can carry a `topic` string that powers:
    • Horizontal scrollable topic-filter tabs
    • Section headings inside the quiz
    • Per-topic score breakdown on the results screen

  topic_order forces the sections into your preferred sequence
  regardless of which URL was listed first.
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<div id="aimcq-quiz-3"></div>
<script>
document.addEventListener('DOMContentLoaded', function () {

  window.loadAimcqFromDrive('aimcq-quiz-3', {

    jsonUrls: [
      {
        jsonUrl: 'https://cdn.jsdelivr.net/gh/fvl777/fvl777@main/neetphyjson/CH-1_%20Basic%20Mathematics%20in%20Physics.json',
        topic:   'Basic Mathematics in Physics'
      },
      {
        jsonUrl: 'https://cdn.jsdelivr.net/gh/YOUR-USER/YOUR-REPO@TAG/path/ch2.json',
        topic:   'Units & Measurements'
      },
      {
        jsonUrl: 'https://cdn.jsdelivr.net/gh/YOUR-USER/YOUR-REPO@TAG/path/ch3.json',
        topic:   'Motion in a Straight Line'
      },
      {
        jsonUrl: 'https://cdn.jsdelivr.net/gh/YOUR-USER/YOUR-REPO@TAG/path/ch4.json',
        topic:   'Motion in a Plane'
      }
    ],

    settings: {
      title: "NEET Physics — Chapters 1–4",
      description: "4 chapters · combined MCQ test from GitHub CDN",
      timer: 40,                      // total minutes for the merged quiz
      shuffle_questions: true,        // shuffles within each topic section
      shuffle_options: true,
      quiz_questions: 40,             // 10 per chapter → numbered 1–10, 11–20 …
      reload_after: 0,

      // Force section order (topic names or slugs):
      topic_order: [
        'Basic Mathematics in Physics',
        'Units & Measurements',
        'Motion in a Straight Line',
        'Motion in a Plane'
      ]
    }
  });
});
</script>


<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  METHOD 4 (optional) — Google Drive via Apps Script proxy
  Only needed when JSON files are on Google Drive and cannot be
  moved to a public host. jsDelivr / CDN URLs above do NOT need this.

  Setup:
    1. script.google.com → New Project → paste:
         function doGet(e) {
           var file = DriveApp.getFileById(e.parameter.id);
           return ContentService
             .createTextOutput(file.getBlob().getDataAsString())
             .setMimeType(ContentService.MimeType.JSON);
         }
    2. Deploy → Web App → "Anyone" access → copy the Web App URL.
    3. Set it globally once per site (after the engine <script> tag):
         <script>
           window.AIMCQ_CONFIG = {
             appsScriptUrl: 'https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec'
           };
         </script>
    4. Then use driveFileId / driveFileIds in each quiz block:
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
